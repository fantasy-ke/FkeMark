<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">FkeMark settings page</title>
  <desc id="desc">A blue-white settings illustration showing the settings navigation and content panel.</desc>
  <rect width="1120" height="540" rx="34" fill="#f6f9ff"/>
  <rect x="70" y="70" width="980" height="400" rx="30" fill="#fff" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="70" y="70" width="265" height="400" rx="30" fill="#eaf2ff"/>
  <path d="M335 70v400" stroke="#bfdbfe" stroke-width="2"/>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="108" y="122" font-size="26" font-weight="900" fill="#172033">Settings</text>
    <g font-size="17" font-weight="750">
      <rect x="102" y="154" width="190" height="38" rx="14" fill="#2563eb"/><text x="126" y="179" fill="#fff">Appearance</text>
      <text x="126" y="226" fill="#475569">Editor</text><text x="126" y="270" fill="#475569">View</text><text x="126" y="314" fill="#475569">Images</text><text x="126" y="358" fill="#475569">Shortcuts</text><text x="126" y="402" fill="#475569">AI Assistant</text>
    </g>
    <text x="390" y="126" font-size="28" font-weight="900" fill="#172033">Clear writing preferences</text>
    <text x="390" y="164" font-size="16" fill="#52627a">Theme, font, editor width, toolbar, shortcuts, language, and assistant options.</text>
    <g transform="translate(390 210)"><rect width="580" height="64" rx="18" fill="#f8fbff" stroke="#dbeafe"/><text x="28" y="40" font-size="18" font-weight="800" fill="#172033">Theme follows system</text><rect x="492" y="20" width="48" height="24" rx="12" fill="#2563eb"/><circle cx="522" cy="32" r="10" fill="#fff"/></g>
    <g transform="translate(390 296)"><rect width="580" height="64" rx="18" fill="#f8fbff" stroke="#dbeafe"/><text x="28" y="40" font-size="18" font-weight="800" fill="#172033">Editor width · Medium</text><rect x="360" y="28" width="170" height="8" rx="4" fill="#dbeafe"/><rect x="360" y="28" width="96" height="8" rx="4" fill="#2563eb"/></g>
    <g transform="translate(390 382)"><rect width="580" height="64" rx="18" fill="#f8fbff" stroke="#dbeafe"/><text x="28" y="40" font-size="18" font-weight="800" fill="#172033">Custom shortcuts</text><rect x="410" y="18" width="130" height="30" rx="15" fill="#e0f2fe"/><text x="475" y="39" text-anchor="middle" font-size="14" font-weight="800" fill="#0369a1">Ctrl+K</text></g>
  </g>
