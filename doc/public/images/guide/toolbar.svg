<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">FkeMark toolbar map</title>
  <desc id="desc">A blue-white toolbar illustration showing file, mode, format, insert, and assistant groups.</desc>
  <rect width="1120" height="420" rx="34" fill="#f6f9ff"/>
  <rect x="70" y="78" width="980" height="86" rx="28" fill="#fff" stroke="#bfdbfe" stroke-width="2"/>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="86" y="54" font-size="24" font-weight="900" fill="#172033">Toolbar Areas</text>
    <g transform="translate(98 105)"><rect width="132" height="36" rx="18" fill="#dbeafe"/><text x="66" y="24" text-anchor="middle" font-size="16" font-weight="800" fill="#1d4ed8">File</text></g>
    <g transform="translate(258 105)"><rect width="158" height="36" rx="18" fill="#e0f2fe"/><text x="79" y="24" text-anchor="middle" font-size="16" font-weight="800" fill="#0369a1">Mode</text></g>
    <g transform="translate(444 105)"><rect width="210" height="36" rx="18" fill="#dbeafe"/><text x="105" y="24" text-anchor="middle" font-size="16" font-weight="800" fill="#1d4ed8">Format</text></g>
    <g transform="translate(682 105)"><rect width="170" height="36" rx="18" fill="#e0f2fe"/><text x="85" y="24" text-anchor="middle" font-size="16" font-weight="800" fill="#0369a1">Insert</text></g>
    <g transform="translate(880 105)"><rect width="138" height="36" rx="18" fill="#dbeafe"/><text x="69" y="24" text-anchor="middle" font-size="16" font-weight="800" fill="#1d4ed8">Tools</text></g>
    <g font-size="16" fill="#52627a">
      <text x="110" y="236">New / Open / Save</text><text x="282" y="236">Live · Read · Source</text><text x="450" y="236">Heading · Bold · Link · Quote</text><text x="700" y="236">Image · Table · Code</text><text x="876" y="236">AI · Spell · Slides</text>
    </g>
    <g stroke="#60a5fa" stroke-width="3" stroke-linecap="round"><path d="M164 168v38"/><path d="M337 168v38"/><path d="M550 168v38"/><path d="M760 168v38"/><path d="M949 168v38"/></g>
    <rect x="70" y="292" width="980" height="58" rx="22" fill="#0f172a"/>
    <text x="98" y="328" font-size="18" fill="#dbeafe">Tip: keep the toolbar floating near the editor, or move it in Settings → View.</text>
  </g>
</svg>
