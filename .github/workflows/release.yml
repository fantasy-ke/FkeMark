name: Release

# 仅当推送 v* tag 时触发，产出正式 Release（发布态，非 Draft，标记为 latest）
#
# 借鉴 GoNavi 流水线特殊设置 + 适配 Tauri v2：
# 1. 顶层 permissions：全局声明写权限
# 2. 从 tag vX.Y.Z 提取数字版本号，构建前写入 Cargo.toml/tauri.conf.json/package.json
#    确保 msi 用合法 major.minor.patch 打包（WiX 约束）
# 3. changelog 末尾附 compare 链接
# 4. make_latest：true：标记为最新 release
# 5. 产物统一重命名：FkeMark-{version}-{os}-{arch}.{ext}
# 6. SHA256SUMS：产物校验文件
# 7. if-no-files-found: error：artifact 严格模式
# 8. retention-days：artifact 保留期
# 9. 三阶段：create-release → build(matrix) → publish
#
# Tauri v2 关键变更：
# - Linux 依赖从 webkit2gtk-4.0 / libsoup2.4 升级为 webkit2gtk-4.1 / libsoup3
# - beforeBuildCommand 在 tauri.conf.json 中配置，tauri-action 会自动触发前端构建
# - VITE 环境变量设置在 tauri-action 步骤上，确保 beforeBuildCommand 能读取到

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: FkeMark

jobs:
  # 阶段一：创建正式 Release（发布态）并生成「自上一正式版本以来」的分类变更日志
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      version: ${{ steps.meta.outputs.version }}
      changelog: ${{ steps.gen.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          # 需要完整历史与全部 tag，才能定位「上一正式版本」并生成完整日志
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release metadata
        id: meta
        run: |
          # tag 形如 v0.2.0，提取数字版本号 0.2.0
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=FkeMark ${TAG}" >> "$GITHUB_OUTPUT"
          echo "[INFO] Formal version: tag=${TAG}, version=${VERSION}"

      # 生成分类变更日志：取上一 v* tag 到当前之间的全部提交，按 .github/changelog.yml 归类
      - name: Generate changelog (since last formal version)
        id: gen
        env:
          CHANGELOG_INTRO: 'FkeMark - 一款文件系统优先的极简 Markdown 混合即时渲染编辑器。'
        run: |
          python3 -m pip install -q pyyaml || true
          cat > /tmp/gen_changelog.py <<'PY'
          import os, subprocess, re, yaml
          with open('.github/changelog.yml', encoding='utf-8') as f:
              cfg = yaml.safe_load(f)
          cats = cfg['categories']
          cur = os.environ['GITHUB_REF_NAME']
          # 列出所有 v* tag（降序），跳过当前 tag，取上一个正式版本
          out = subprocess.run(['git', 'tag', '--list', 'v*', '--sort=-v:refname'],
                               capture_output=True, text=True).stdout.split()
          prev = None
          for t in out:
              if t != cur:
                  prev = t
                  break
          rng = (prev + '..HEAD') if prev else 'HEAD'
          log = subprocess.run(['git', 'log', rng, '--pretty=format:%s'],
                               capture_output=True, text=True).stdout.splitlines()

          def classify(msg):
              m = re.match(r'^\s*([A-Za-z]+)(?:\([^)]*\))?!?:\s*(.*)$', msg)
              return m.group(1).lower() if m else None

          star = next((c['title'] for c in cats if '*' in c.get('prefixes', [])), None)
          buckets = {c['title']: [] for c in cats}
          for line in log:
              line = line.strip()
              if not line:
                  continue
              typ = classify(line)
              placed = False
              for c in cats:
                  if typ and typ in c.get('prefixes', []):
                      buckets[c['title']].append(line)
                      placed = True
                      break
              if not placed:
                  buckets[star].append(line)

          sections = []
          for c in cats:
              items = buckets.get(c['title'], [])
              if not items:
                  continue
              sections.append('### ' + c['title'])
              for it in items:
                  sections.append('- ' + it)
              sections.append('')
          intro = os.environ.get('CHANGELOG_INTRO', '')
          body = (intro + '\n\n' + '\n'.join(sections).strip()).strip()
          # 附 compare 链接（借鉴 GoNavi，方便用户查看完整变更）
          if prev:
              repo = os.environ.get('GITHUB_REPOSITORY', '')
              server = os.environ.get('GITHUB_SERVER_URL', 'https://github.com')
              body += f"\n\n---\n**Full changes**: [{prev}...{cur}]({server}/{repo}/compare/{prev}...{cur})\n"
          body += '\n'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('changelog<<EOF\n')
              f.write(body)
              f.write('EOF\n')
          PY
          python3 /tmp/gen_changelog.py

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: false
          draft: false
          make_latest: true
          body: ${{ steps.gen.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 阶段二：各平台构建（写入版本号 → Tauri 构建 → 产物重命名 → upload-artifact）
  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
            os_name: windows
            arch_name: x64
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
            os_name: macos
            arch_name: x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            os_name: macos
            arch_name: arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage
            os_name: linux
            arch_name: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # 关键：把 tag 提取的版本号写入三个配置文件，确保 msi 用合法 major.minor.patch 打包
      # 用 Python 跨平台替换（避免 macOS BSD sed 与 GNU sed 的 -i 行为差异）
      - name: Bump version in config files
        shell: bash
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          PYTHONIOENCODING: utf-8
        run: |
          set -euo pipefail
          echo "[INFO] Writing version ${VERSION} to config files"
          python3 - <<'PY'
          import re, os, sys
          # Force UTF-8 stdout for Windows CI compatibility
          sys.stdout.reconfigure(encoding='utf-8')
          ver = os.environ['VERSION']
          # Validate version must be pure numeric major.minor.patch (msi/WiX constraint)
          if not re.fullmatch(r'\d+\.\d+\.\d+', ver):
              raise SystemExit(f'[ERROR] Version {ver} is not valid major.minor.patch format')
          files = [
              ('src-tauri/Cargo.toml', r'^version = "\d+\.\d+\.\d+"', f'version = "{ver}"'),
              ('src-tauri/tauri.conf.json', r'"version": "\d+\.\d+\.\d+"', f'"version": "{ver}"'),
              ('package.json', r'"version": "\d+\.\d+\.\d+"', f'"version": "{ver}"'),
          ]
          for path, pattern, repl in files:
              with open(path, encoding='utf-8') as f:
                  content = f.read()
              new_content, n = re.subn(pattern, repl, content, count=1, flags=re.MULTILINE)
              if n == 0:
                  raise SystemExit(f'[ERROR] {path}: no match for {pattern}')
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print(f'  [OK] {path} -> {ver}')
          PY
          echo "[OK] Version written:"
          grep '^version' src-tauri/Cargo.toml
          grep '"version"' src-tauri/tauri.conf.json
          grep '"version"' package.json | head -1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Tauri v2 的 webkit2gtk 链接 libsoup3（对应 webkit2gtk-4.1-dev），
          # 而非 v1 的 libsoup2.4（webkit2gtk-4.0-dev）。
          # libappindicator3-dev 已弃用，改用 libayatana-appindicator3-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev dpkg build-essential libssl-dev libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      # VITE 环境变量设置在 tauri-action 步骤上，确保 beforeBuildCommand 触发的
      # npm run build 能读取到（tauri.conf.json 中配置了 beforeBuildCommand）
      #   VITE_UPDATE_CHANNEL=latest → 前端 getBuildChannel() 返回 'latest'，更新通道默认选 latest
      #   VITE_APP_VERSION=X.Y.Z → 前端 __APP_VERSION__ 显示为 X.Y.Z（与 msi 打包版本号一致）
      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      # Tauri 构建：不传 tagName（避免 tauri-action 上传未重命名的产物）
      # msi 用已写入的合法版本号打包
      # beforeBuildCommand: "npm run build" 会自动构建前端（VITE env 在此步骤生效）
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          VITE_UPDATE_CHANNEL: latest
          VITE_APP_VERSION: ${{ needs.create-release.outputs.version }}
        with:
          projectPath: src-tauri
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # 产物重命名：统一为 FkeMark-{version}-{os}-{arch}.{ext} 格式
      - name: Rename and collect artifacts
        shell: bash
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          OS_NAME: ${{ matrix.os_name }}
          ARCH_NAME: ${{ matrix.arch_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGING="release-staging"
          mkdir -p "$STAGING"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          echo "[INFO] Collecting artifacts (version=${VERSION}, os=${OS_NAME}, arch=${ARCH_NAME})"

          # Windows: msi + nsis + portable exe
          if [ "${OS_NAME}" = "windows" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/msi/*.msi; do
              mv "$f" "$STAGING/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}.msi"
              echo "  [OK] $(ls "$STAGING"/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}.msi)"
            done
            for f in "$BUNDLE_DIR"/nsis/*-setup.exe; do
              mv "$f" "$STAGING/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}-setup.exe"
              echo "  [OK] $(ls "$STAGING"/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}-setup.exe)"
            done
            # 便携版 exe（cargo 编译产物，不在 bundle 内）
            # Tauri 构建后会把 cargo 产物 fke-mark.exe 重命名为 FkeMark.exe，兼容两种命名
            PORTABLE="$(ls src-tauri/target/${TARGET}/release/FkeMark.exe src-tauri/target/${TARGET}/release/fke-mark.exe 2>/dev/null | head -1 || true)"
            if [ -n "$PORTABLE" ] && [ -f "$PORTABLE" ]; then
              cp "$PORTABLE" "$STAGING/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}-portable.exe"
              echo "  [OK] $STAGING/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}-portable.exe"
            else
              echo "  [WARN] Portable exe not found, skipping"
            fi
          fi

          # macOS: dmg
          if [ "${OS_NAME}" = "macos" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/dmg/*.dmg; do
              mv "$f" "$STAGING/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}.dmg"
              echo "  [OK] $(ls "$STAGING"/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}.dmg)"
            done
          fi

          # Linux: deb + appimage
          if [ "${OS_NAME}" = "linux" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/deb/*.deb; do
              mv "$f" "$STAGING/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}.deb"
              echo "  [OK] $(ls "$STAGING"/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}.deb)"
            done
            for f in "$BUNDLE_DIR"/appimage/*.AppImage; do
              mv "$f" "$STAGING/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}.AppImage"
              echo "  [OK] $(ls "$STAGING"/FkeMark-${VERSION}-${OS_NAME}-${ARCH_NAME}.AppImage)"
            done
          fi

          echo "[INFO] Artifact list:"
          ls -lh "$STAGING"/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-build-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: release-staging/*
          if-no-files-found: error
          retention-days: 7

  # 阶段三：收集所有产物，生成 SHA256SUMS，上传到 Release
  publish:
    name: Publish Release Assets
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-build-*
          merge-multiple: true

      - name: List assets
        run: |
          echo "[INFO] Downloaded assets:"
          ls -lh release-assets/

      # 生成 SHA256SUMS 校验文件
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release-assets
          FILES=()
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              FILES+=("$file")
            fi
          done < <(find . -maxdepth 1 -type f ! -name SHA256SUMS -exec basename {} \; | sort)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "[WARN] No artifact files found, generating empty SHA256SUMS"
            : > SHA256SUMS
          else
            sha256sum "${FILES[@]}" > SHA256SUMS
            echo "[OK] SHA256SUMS generated:"
            cat SHA256SUMS
          fi

      # 生成 latest.json 静态更新清单（供客户端检查更新，避免 GitHub API 速率限制）
      # 客户端 updater.ts 会从 releases/latest/download/latest.json 下载此文件
      - name: Generate latest.json manifest
        shell: bash
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          PYTHONIOENCODING: utf-8
        run: |
          python3 - <<'PY'
          import json, os, glob, sys, hashlib
          # Force UTF-8 stdout for Windows CI compatibility
          sys.stdout.reconfigure(encoding='utf-8')
          version = os.environ['VERSION']
          tag = os.environ['TAG_NAME']
          repo = os.environ['GITHUB_REPO']
          server = os.environ.get('GITHUB_SERVER_URL', 'https://github.com')
          base_url = f"{server}/{repo}/releases/download/{tag}"
          html_url = f"{server}/{repo}/releases/tag/{tag}"
          def sha256_of(path):
              h = hashlib.sha256()
              with open(path, 'rb') as fp:
                  for chunk in iter(lambda: fp.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()
          files = sorted(glob.glob('release-assets/*'))
          files = [f for f in files if os.path.isfile(f) and not os.path.basename(f).endswith('.json') and os.path.basename(f) != 'SHA256SUMS']
          downloads = {}
          for f in files:
              name = os.path.basename(f)
              url = f"{base_url}/{name}"
              size = os.path.getsize(f)
              low = name.lower()
              # sha256 用于客户端应用内下载的完整性校验
              entry = {'name': name, 'url': url, 'size': size, 'sha256': sha256_of(f)}
              # Windows: 优先 -setup.exe，其次 .msi
              if 'windows' in low and ('-setup.exe' in low or low.endswith('.msi')):
                  if 'windows' not in downloads or '-setup.exe' in name:
                      downloads['windows'] = entry
              # macOS: .dmg
              elif 'macos' in low and low.endswith('.dmg'):
                  downloads.setdefault('macos', entry)
              # Linux: 优先 .deb，其次 .AppImage
              elif 'linux' in low and (low.endswith('.deb') or low.endswith('.appimage')):
                  if 'linux' not in downloads or low.endswith('.deb'):
                      downloads['linux'] = entry
          manifest = {
              'version': version,
              'tagName': tag,
              'pubDate': __import__('datetime').datetime.utcnow().isoformat() + 'Z',
              'releaseNotes': 'FkeMark formal release',
              'htmlUrl': html_url,
              'downloads': downloads,
          }
          with open('release-assets/latest.json', 'w', encoding='utf-8') as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          print('[OK] latest.json generated:')
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY

      # 上传重命名后的产物到正式 release
      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          name: ${{ needs.create-release.outputs.release_name }}
          prerelease: false
          draft: false
          make_latest: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "[DONE] Release published successfully"
          echo "  Version: ${{ needs.create-release.outputs.version }}"
          echo "  Tag: ${{ needs.create-release.outputs.tag_name }}"
          echo "  Artifacts: $(find release-assets -type f ! -name SHA256SUMS | wc -l)"
