name: Release

# 仅当推送 v* tag 时触发，产出正式 Release（发布态，非 Draft）
on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: FkeMark

jobs:
  # 统一创建正式 Release，并生成「自上一正式版本以来」的分类变更日志
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
      changelog: ${{ steps.gen.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          # 需要完整历史与全部 tag，才能定位「上一正式版本」并生成完整日志
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release metadata
        id: meta
        run: |
          echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=FkeMark ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
          # 正式发布，直接发布（非 Draft）
          echo "draft=false" >> "$GITHUB_OUTPUT"

      # 生成分类变更日志：取上一 v* tag 到当前之间的全部提交，按 .github/changelog.yml 的分类归类
      - name: Generate changelog (since last formal version)
        id: gen
        env:
          CHANGELOG_INTRO: 'FkeMark - 一款文件系统优先的极简 Markdown 混合即时渲染编辑器。'
        run: |
          python3 -m pip install -q pyyaml || true
          cat > /tmp/gen_changelog.py <<'PY'
          import os, subprocess, re, yaml
          with open('.github/changelog.yml', encoding='utf-8') as f:
              cfg = yaml.safe_load(f)
          cats = cfg['categories']
          cur = os.environ['GITHUB_REF_NAME']
          # 列出所有 v* tag（降序），跳过当前 tag，取上一个正式版本
          out = subprocess.run(['git', 'tag', '--list', 'v*', '--sort=-v:refname'],
                               capture_output=True, text=True).stdout.split()
          prev = None
          for t in out:
              if t != cur:
                  prev = t
                  break
          rng = (prev + '..HEAD') if prev else 'HEAD'
          log = subprocess.run(['git', 'log', rng, '--pretty=format:%s'],
                               capture_output=True, text=True).stdout.splitlines()

          def classify(msg):
              m = re.match(r'^\s*([A-Za-z]+)(?:\([^)]*\))?!?:\s*(.*)$', msg)
              return m.group(1).lower() if m else None

          star = next((c['title'] for c in cats if '*' in c.get('prefixes', [])), None)
          buckets = {c['title']: [] for c in cats}
          for line in log:
              line = line.strip()
              if not line:
                  continue
              typ = classify(line)
              placed = False
              for c in cats:
                  if typ and typ in c.get('prefixes', []):
                      buckets[c['title']].append(line)
                      placed = True
                      break
              if not placed:
                  buckets[star].append(line)

          sections = []
          for c in cats:
              items = buckets.get(c['title'], [])
              if not items:
                  continue
              sections.append('### ' + c['title'])
              for it in items:
                  sections.append('- ' + it)
              sections.append('')
          intro = os.environ.get('CHANGELOG_INTRO', '')
          body = (intro + '\n\n' + '\n'.join(sections).strip()).strip() + '\n'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('changelog<<EOF\n')
              f.write(body)
              f.write('EOF\n')
          PY
          python3 /tmp/gen_changelog.py

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          body: ${{ steps.gen.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg app
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage

    runs-on: ${{ matrix.platform }}
    # tauri-action 会创建 GitHub Release 并上传安装包，需要写权限
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Tauri v1 的 webkit2gtk 链接 libsoup-2.4（对应 webkit2gtk-4.0-dev），
          # 而非 4.1（libsoup3）。libappindicator1-dev 已移除，改用 libappindicator3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev dpkg build-essential libssl-dev libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      # 关键修复：原配置 beforeBuildCommand 为空且未显式构建前端，
      # 导致 dist 目录缺失、tauri build 直接失败。这里先构建前端。
      - name: Build frontend
        run: npm run build

      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Tauri 工程位于 src-tauri 子目录，必须显式指定，否则在仓库根找 Cargo.toml 导致 ENOENT
          projectPath: src-tauri
          tagName: ${{ needs.create-release.outputs.tag_name }}
          releaseName: ${{ needs.create-release.outputs.release_name }}
          # 使用生成的「自上一正式版本以来」完整分类变更日志作为 Release 正文
          releaseBody: ${{ needs.create-release.outputs.changelog }}
          releaseDraft: ${{ needs.create-release.outputs.draft }}
          prerelease: ${{ needs.create-release.outputs.prerelease }}
          # 未启用 updater，关闭以免要求签名密钥
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # 便携版产物名：cargo 产出 fke-mark.exe，Tauri 已重命名为 FkeMark.exe
      - name: Upload portable build (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-portable-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/FkeMark.exe
            src-tauri/icons/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
