name: Release

# 仅当推送 v* tag 时触发，产出正式 Release（draft，手动发布）
on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: FkeMark

jobs:
  # 先统一创建 draft Release，避免 4 个构建 job 并行时竞争创建同一 tag 的 Release
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute release metadata
        id: meta
        run: |
          echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=FkeMark ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
          echo "draft=true" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          body: 'FkeMark - 一款文件系统优先的极简 Markdown 混合即时渲染编辑器。'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg app
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage

    runs-on: ${{ matrix.platform }}
    # tauri-action 会创建 GitHub Release 并上传安装包，需要写权限
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Tauri v1 的 webkit2gtk 链接 libsoup-2.4（对应 webkit2gtk-4.0-dev），
          # 而非 4.1（libsoup3）。libappindicator1-dev 已移除，改用 libappindicator3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev dpkg build-essential libssl-dev libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      # 关键修复：原配置 beforeBuildCommand 为空且未显式构建前端，
      # 导致 dist 目录缺失、tauri build 直接失败。这里先构建前端。
      - name: Build frontend
        run: npm run build

      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      # 从独立文件加载 changelog 分类配置（.github/changelog.yml）
      - name: Load changelog config
        run: |
          echo "CHANGELOG<<EOF" >> "$GITHUB_ENV"
          cat .github/changelog.yml >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Tauri 工程位于 src-tauri 子目录，必须显式指定，否则在仓库根找 Cargo.toml 导致 ENOENT
          projectPath: src-tauri
          tagName: ${{ needs.create-release.outputs.tag_name }}
          releaseName: ${{ needs.create-release.outputs.release_name }}
          releaseBody: 'FkeMark - 一款文件系统优先的极简 Markdown 混合即时渲染编辑器。'
          releaseDraft: ${{ needs.create-release.outputs.draft }}
          prerelease: ${{ needs.create-release.outputs.prerelease }}
          # 未启用 updater，关闭以免要求签名密钥
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          # 引用外部 changelog 配置文件（五类：新功能/问题修复/文档与流程/重构与优化/其他更新）
          changelog: ${{ env.CHANGELOG }}

      # 便携版产物名：cargo 产出 fke-mark.exe，Tauri 已重命名为 FkeMark.exe
      - name: Upload portable build (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-portable-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/FkeMark.exe
            src-tauri/icons/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
