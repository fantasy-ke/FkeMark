name: Dev Build

# 推送到 dev 分支即触发，产出开发预发布版（tag: dev-latest，Pre-release，自动发布，仅供测试）
on:
  push:
    branches:
      - dev

env:
  APP_NAME: FkeMark

jobs:
  # 开发预发布：每次推送先清理旧的 dev-latest，再创建新的 Pre-release，并生成自上一正式版本以来的变更日志
  dev-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
      changelog: ${{ steps.gen.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release metadata
        id: meta
        run: |
          # 开发测试版：版本号为 Dev Build (dev-<短SHA>)，Pre-release
          echo "tag_name=dev-latest" >> "$GITHUB_OUTPUT"
          echo "release_name=Dev Build (dev-${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
          echo "draft=false" >> "$GITHUB_OUTPUT"

      # dev 分支每次推送都会重建 dev-latest，先清理已存在的 release 与 tag
      - name: Reset dev-latest (delete existing release + tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev-latest --yes || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/dev-latest" || true

      # 生成分类变更日志：取上一 v* tag 到当前之间的全部提交，按 .github/changelog.yml 归类
      - name: Generate changelog (since last formal version)
        id: gen
        env:
          CHANGELOG_INTRO: '自动化开发构建（Dev Build），仅供测试，请勿用于生产环境。'
        run: |
          python3 -m pip install -q pyyaml || true
          cat > /tmp/gen_changelog.py <<'PY'
          import os, subprocess, re, yaml
          with open('.github/changelog.yml', encoding='utf-8') as f:
              cfg = yaml.safe_load(f)
          cats = cfg['categories']
          cur = os.environ['GITHUB_REF_NAME']
          out = subprocess.run(['git', 'tag', '--list', 'v*', '--sort=-v:refname'],
                               capture_output=True, text=True).stdout.split()
          prev = None
          for t in out:
              if t != cur:
                  prev = t
                  break
          rng = (prev + '..HEAD') if prev else 'HEAD'
          log = subprocess.run(['git', 'log', rng, '--pretty=format:%s'],
                               capture_output=True, text=True).stdout.splitlines()

          def classify(msg):
              m = re.match(r'^\s*([A-Za-z]+)(?:\([^)]*\))?!?:\s*(.*)$', msg)
              return m.group(1).lower() if m else None

          star = next((c['title'] for c in cats if '*' in c.get('prefixes', [])), None)
          buckets = {c['title']: [] for c in cats}
          for line in log:
              line = line.strip()
              if not line:
                  continue
              typ = classify(line)
              placed = False
              for c in cats:
                  if typ and typ in c.get('prefixes', []):
                      buckets[c['title']].append(line)
                      placed = True
                      break
              if not placed:
                  buckets[star].append(line)

          sections = []
          for c in cats:
              items = buckets.get(c['title'], [])
              if not items:
                  continue
              sections.append('### ' + c['title'])
              for it in items:
                  sections.append('- ' + it)
              sections.append('')
          intro = os.environ.get('CHANGELOG_INTRO', '')
          body = (intro + '\n\n' + '\n'.join(sections).strip()).strip() + '\n'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('changelog<<EOF\n')
              f.write(body)
              f.write('EOF\n')
          PY
          python3 /tmp/gen_changelog.py

      # 生成更新清单 JSON（供 app 内检查更新使用，避免 GitHub API 速率限制）
      - name: Generate update manifest (dev.json)
        id: manifest
        run: |
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          HTML_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/dev-latest"
          VERSION="dev-${GITHUB_SHA::7}"
          # 转义 changelog 为 JSON 字符串
          CHANGELOG_JSON=$(echo '${{ steps.gen.outputs.changelog }}' | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          cat > dev.json <<JSON
          {
            "version": "${VERSION}",
            "tagName": "dev-latest",
            "pubDate": "${PUB_DATE}",
            "releaseNotes": ${CHANGELOG_JSON},
            "htmlUrl": "${HTML_URL}"
          }
          JSON
          echo "Generated dev.json:"
          cat dev.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          body: ${{ steps.gen.outputs.changelog }}
          files: dev.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [dev-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg app
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev dpkg build-essential libssl-dev libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ needs.dev-release.outputs.tag_name }}
          releaseName: ${{ needs.dev-release.outputs.release_name }}
          releaseBody: ${{ needs.dev-release.outputs.changelog }}
          releaseDraft: ${{ needs.dev-release.outputs.draft }}
          prerelease: ${{ needs.dev-release.outputs.prerelease }}
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload portable build (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-portable-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/FkeMark.exe
            src-tauri/icons/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
