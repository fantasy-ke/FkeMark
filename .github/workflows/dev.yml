name: Dev Build

# 推送到 dev 分支即触发，产出开发预发布版（tag: dev-latest，Pre-release，自动发布，仅供测试）
#
# 设计要点（借鉴 GoNavi 流水线 + 适配 Tauri v1）：
# 1. concurrency 取消同分支旧构建，节省 CI 资源
# 2. dev 版本号 dev-<短SHA7>（如 dev-d0a6a97）作为 Release 名称 + 产物文件名后缀
# 3. msi 打包关键：不修改 Cargo.toml/tauri.conf.json 的版本号（保持 0.1.0），
#    避免 WiX 因非数字版本号失败。dev-<SHA> 仅用于显示与产物重命名
# 4. 构建产物统一重命名为 FkeMark-{version}-{os}-{arch}.{ext} 格式
# 5. 生成 SHA256SUMS 校验文件
# 6. 三阶段：dev-release(建空 release) → build(matrix 构建并重命名) → publish(收集产物上传)

on:
  push:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: FkeMark

jobs:
  # 阶段一：创建 Pre-release 并生成变更日志
  dev-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      dev_version: ${{ steps.meta.outputs.dev_version }}
      changelog: ${{ steps.gen.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release metadata
        id: meta
        run: |
          # dev 版本号：dev-<短SHA7>，如 dev-d0a6a97
          DEV_VERSION="dev-${GITHUB_SHA::7}"
          echo "dev_version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=dev-latest" >> "$GITHUB_OUTPUT"
          echo "release_name=${DEV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "📌 Dev 版本号: ${DEV_VERSION}"

      # dev 分支每次推送都会重建 dev-latest，先清理旧的 release 与 tag
      - name: Reset dev-latest (delete existing release + tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev-latest --yes || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/dev-latest" || true

      # 生成分类变更日志：取上一 v* tag 到当前之间的全部提交，按 .github/changelog.yml 归类
      - name: Generate changelog (since last formal version)
        id: gen
        env:
          CHANGELOG_INTRO: '自动化开发构建（Dev Build），仅供测试，请勿用于生产环境。'
        run: |
          python3 -m pip install -q pyyaml || true
          cat > /tmp/gen_changelog.py <<'PY'
          import os, subprocess, re, yaml
          with open('.github/changelog.yml', encoding='utf-8') as f:
              cfg = yaml.safe_load(f)
          cats = cfg['categories']
          cur = os.environ['GITHUB_REF_NAME']
          out = subprocess.run(['git', 'tag', '--list', 'v*', '--sort=-v:refname'],
                               capture_output=True, text=True).stdout.split()
          prev = None
          for t in out:
              if t != cur:
                  prev = t
                  break
          rng = (prev + '..HEAD') if prev else 'HEAD'
          log = subprocess.run(['git', 'log', rng, '--pretty=format:%s'],
                               capture_output=True, text=True).stdout.splitlines()

          def classify(msg):
              m = re.match(r'^\s*([A-Za-z]+)(?:\([^)]*\))?!?:\s*(.*)$', msg)
              return m.group(1).lower() if m else None

          star = next((c['title'] for c in cats if '*' in c.get('prefixes', [])), None)
          buckets = {c['title']: [] for c in cats}
          for line in log:
              line = line.strip()
              if not line:
                  continue
              typ = classify(line)
              placed = False
              for c in cats:
                  if typ and typ in c.get('prefixes', []):
                      buckets[c['title']].append(line)
                      placed = True
                      break
              if not placed:
                  buckets[star].append(line)

          sections = []
          for c in cats:
              items = buckets.get(c['title'], [])
              if not items:
                  continue
              sections.append('### ' + c['title'])
              for it in items:
                  sections.append('- ' + it)
              sections.append('')
          intro = os.environ.get('CHANGELOG_INTRO', '')
          body = (intro + '\n\n' + '\n'.join(sections).strip()).strip() + '\n'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('changelog<<EOF\n')
              f.write(body)
              f.write('EOF\n')
          PY
          python3 /tmp/gen_changelog.py

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: true
          draft: false
          body: ${{ steps.gen.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 阶段二：各平台构建（Tauri 不传 tagName，仅构建不上传；产物重命名后 upload-artifact）
  build:
    needs: [dev-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
            os_name: windows
            arch_name: x64
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
            os_name: macos
            arch_name: x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            os_name: macos
            arch_name: arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage
            os_name: linux
            arch_name: x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Tauri v1 的 webkit2gtk 链接 libsoup-2.4（对应 webkit2gtk-4.0-dev），
          # 而非 4.1（libsoup3）。libappindicator1-dev 已移除，改用 libappindicator3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev dpkg build-essential libssl-dev libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      # 关键修复：原配置 beforeBuildCommand 为空且未显式构建前端，
      # 导致 dist 目录缺失、tauri build 直接失败。这里先构建前端。
      - name: Build frontend
        run: npm run build

      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      # Tauri 构建：不传 tagName（避免 tauri-action 上传未重命名的产物）
      # msi 用 tauri.conf.json 中的版本号 0.1.0 打包，确保 WiX 版本号合法
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: src-tauri
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # 产物重命名：统一为 FkeMark-{dev_version}-{os}-{arch}.{ext} 格式
      # 便于用户识别版本，与 GoNavi 产物命名风格对齐
      - name: Rename and collect artifacts
        shell: bash
        env:
          DEV_VERSION: ${{ needs.dev-release.outputs.dev_version }}
          OS_NAME: ${{ matrix.os_name }}
          ARCH_NAME: ${{ matrix.arch_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGING="release-staging"
          mkdir -p "$STAGING"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          echo "📦 收集并重命名产物 (dev_version=${DEV_VERSION}, os=${OS_NAME}, arch=${ARCH_NAME})"

          # Windows: msi + nsis + portable exe
          if [ "${OS_NAME}" = "windows" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/msi/*.msi; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.msi"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.msi)"
            done
            for f in "$BUNDLE_DIR"/nsis/*-setup.exe; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}-setup.exe"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}-setup.exe)"
            done
            # 便携版 exe（cargo 编译产物，不在 bundle 内）
            # Tauri 构建后会把 cargo 产物 fke-mark.exe 重命名为 FkeMark.exe，兼容两种命名
            PORTABLE="$(ls src-tauri/target/${TARGET}/release/FkeMark.exe src-tauri/target/${TARGET}/release/fke-mark.exe 2>/dev/null | head -1 || true)"
            if [ -n "$PORTABLE" ] && [ -f "$PORTABLE" ]; then
              cp "$PORTABLE" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}-portable.exe"
              echo "  ✅ $STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}-portable.exe"
            else
              echo "  ⚠️ 未找到便携版 exe，跳过"
            fi
          fi

          # macOS: dmg
          if [ "${OS_NAME}" = "macos" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/dmg/*.dmg; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.dmg"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.dmg)"
            done
          fi

          # Linux: deb + appimage
          if [ "${OS_NAME}" = "linux" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/deb/*.deb; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.deb"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.deb)"
            done
            for f in "$BUNDLE_DIR"/appimage/*.AppImage; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.AppImage"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.AppImage)"
            done
          fi

          echo "📋 产物清单:"
          ls -lh "$STAGING"/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: release-staging/*
          retention-days: 7

  # 阶段三：收集所有产物，生成 SHA256SUMS，上传到 Release
  publish:
    name: Publish Dev Pre-release
    needs: [dev-release, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: dev-build-*
          merge-multiple: true

      - name: List assets
        run: |
          echo "📋 下载的产物清单:"
          ls -lh release-assets/

      # 生成 SHA256SUMS 校验文件（借鉴 GoNavi，增强产物可信度）
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release-assets
          FILES=()
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              FILES+=("$file")
            fi
          done < <(find . -maxdepth 1 -type f ! -name SHA256SUMS -exec basename {} \; | sort)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ 未找到产物文件，生成空 SHA256SUMS"
            : > SHA256SUMS
          else
            sha256sum "${FILES[@]}" > SHA256SUMS
            echo "✅ SHA256SUMS 已生成:"
            cat SHA256SUMS
          fi

      # 上传重命名后的产物到 dev-latest release（覆盖空 release）
      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.dev-release.outputs.tag_name }}
          name: ${{ needs.dev-release.outputs.release_name }}
          prerelease: true
          draft: false
          body: ${{ needs.dev-release.outputs.changelog }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "🎉 Dev Build 发布完成"
          echo "  版本号: ${{ needs.dev-release.outputs.dev_version }}"
          echo "  Tag: ${{ needs.dev-release.outputs.tag_name }}"
          echo "  产物数: $(find release-assets -type f ! -name SHA256SUMS | wc -l)"
