name: Dev Build

# 推送到 dev 分支即触发，产出开发预发布版（tag: dev-latest，Pre-release，自动发布，仅供测试）
#
# 借鉴 GoNavi 流水线特殊设置 + 适配 Tauri v2：
# 1. concurrency：取消同分支旧构建，节省 CI 资源
# 2. 顶层 permissions：全局声明写权限，简化各 job 重复声明
# 3. github-script 重置 dev-latest：比 gh CLI 更可靠（分页删除 + try/catch）
# 4. target_commitish：release 指向具体 commit
# 5. 构建时间格式化：北京时间显示
# 6. release body 含元数据：版本/分支/提交/构建时间
# 7. 产物统一重命名：FkeMark-{dev_version}-{os}-{arch}.{ext}
# 8. SHA256SUMS：产物校验文件
# 9. if-no-files-found: error：artifact 严格模式
# 10. retention-days：artifact 保留期
#
# msi 打包关键：不修改 Cargo.toml/tauri.conf.json 版本号（保持 0.1.5），
#    避免 WiX 因非数字版本号失败。dev-<SHA> 仅用于显示与产物重命名
#
# Tauri v2 关键变更：
# - Linux 依赖从 webkit2gtk-4.0 / libsoup2.4 升级为 webkit2gtk-4.1 / libsoup3
# - beforeBuildCommand 在 tauri.conf.json 中配置，tauri-action 会自动触发前端构建
# - VITE 环境变量设置在 tauri-action 步骤上，确保 beforeBuildCommand 能读取到

on:
  push:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  APP_NAME: FkeMark

jobs:
  # 阶段一：创建 Pre-release 并生成变更日志
  dev-release:
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      dev_version: ${{ steps.meta.outputs.dev_version }}
      changelog: ${{ steps.gen.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release metadata
        id: meta
        run: |
          # dev 版本号：dev-<短SHA7>，如 dev-d0a6a97
          DEV_VERSION="dev-${GITHUB_SHA::7}"
          echo "dev_version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=dev-latest" >> "$GITHUB_OUTPUT"
          echo "release_name=🧪 Dev Build (${DEV_VERSION})" >> "$GITHUB_OUTPUT"
          echo "📌 Dev 版本号: ${DEV_VERSION}"

      # GitHub 的 latest release 接口只返回已发布的正式版本，不包含草稿和预发布版本
      - name: Resolve latest formal release
        id: formal_release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data: release } = await github.rest.repos.getLatestRelease({ owner, repo });
              core.info(`Latest formal release: ${release.tag_name} (${release.name || 'unnamed'})`);
              core.setOutput('tag_name', release.tag_name);
            } catch (error) {
              if (error.status === 404) {
                core.warning('No formal GitHub Release found; changelog commit list will be empty.');
                core.setOutput('tag_name', '');
              } else {
                throw error;
              }
            }

      # 用 github-script 重置 dev-latest（借鉴 GoNavi，比 gh CLI 更可靠）
      # 分页查找所有匹配 release 逐个删除，并删除 tag ref，404/422 容错
      - name: Reset dev-latest (delete existing release + tag)
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'dev-latest';
            const ref = `tags/${tag}`;
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo, per_page: 100,
            });
            const matched = releases.filter(r => r.tag_name === tag);
            if (matched.length === 0) {
              core.info(`No existing releases found for tag ${tag}`);
            } else {
              for (const r of matched) {
                core.info(`Deleting release ${r.id} (${r.name || 'unnamed'}) for tag ${tag}`);
                await github.rest.repos.deleteRelease({ owner, repo, release_id: r.id });
              }
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref });
              core.info(`Deleted ref ${ref}`);
            } catch (error) {
              const msg = String(error.response?.data?.message || error.message || '');
              if (error.status === 404 || (error.status === 422 && msg.includes('Reference does not exist'))) {
                core.info(`No existing ref found for ${ref}`);
              } else {
                throw error;
              }
            }

      # 生成分类变更日志：以 GitHub 上一次正式 Release 的 tag 为起点，按 .github/changelog.yml 归类
      - name: Generate changelog (since last formal version)
        id: gen
        env:
          CHANGELOG_INTRO: '自动化开发构建（Dev Build），仅供测试，请勿用于生产环境。'
          FORMAL_RELEASE_TAG: ${{ steps.formal_release.outputs.tag_name }}
        run: |
          python3 -m pip install -q pyyaml || true
          cat > /tmp/gen_changelog.py <<'PY'
          import os, subprocess, re, yaml
          with open('.github/changelog.yml', encoding='utf-8') as f:
              cfg = yaml.safe_load(f)
          cats = cfg['categories']
          prev = os.environ.get('FORMAL_RELEASE_TAG', '').strip()
          head = os.environ['GITHUB_SHA']
          log = []
          if prev:
              tag_ref = 'refs/tags/' + prev
              exists = subprocess.run(
                  ['git', 'rev-parse', '--verify', '--quiet', tag_ref + '^{commit}'],
                  capture_output=True,
              ).returncode == 0
              if not exists:
                  subprocess.run(
                      ['git', 'fetch', '--force', 'origin', tag_ref + ':' + tag_ref],
                      check=True,
                  )
              rng = tag_ref + '..' + head
              print('Changelog range:', rng)
              log = subprocess.run(
                  ['git', 'log', rng, '--pretty=format:%s'],
                  check=True, capture_output=True, encoding='utf-8', errors='replace',
              ).stdout.splitlines()
          else:
              print('No formal release found; skipping repository history.')

          def classify(msg):
              m = re.match(r'^\s*([A-Za-z]+)(?:\([^)]*\))?!?:\s*(.*)$', msg)
              return m.group(1).lower() if m else None

          def sanitize(s):
              # 防止提交信息里的 @xxx（如 "@import 聚合入口"）被 GitHub 当成用户提及，
              # 从而在 release 页面产生幽灵 Contributors 链接。@ 后插入零宽空格即可屏蔽联想，读者不可见。
              return re.sub(r'@(?=[\w-])', '@\u200b', s)

          star = next((c['title'] for c in cats if '*' in c.get('prefixes', [])), None)
          buckets = {c['title']: [] for c in cats}
          for line in log:
              line = line.strip()
              if not line:
                  continue
              typ = classify(line)
              safe = sanitize(line)
              placed = False
              for c in cats:
                  if typ and typ in c.get('prefixes', []):
                      buckets[c['title']].append(safe)
                      placed = True
                      break
              if not placed:
                  buckets[star].append(safe)

          sections = []
          for c in cats:
              items = buckets.get(c['title'], [])
              if not items:
                  continue
              sections.append('### ' + c['title'])
              for it in items:
                  sections.append('- ' + it)
              sections.append('')
          intro = os.environ.get('CHANGELOG_INTRO', '')
          body = (intro + '\n\n' + '\n'.join(sections).strip()).strip() + '\n'
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write('changelog<<EOF\n')
              f.write(body)
              f.write('EOF\n')
          PY
          python3 /tmp/gen_changelog.py

      # 格式化构建时间（北京时间），用于 release body 元数据
      # 用 date 命令 + TZ，比解析 head_commit.timestamp 更可靠（避免空值导致整个发布失败）
      - name: Format build time
        id: build_time
        run: |
          DISPLAY_TIME="$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "display=${DISPLAY_TIME}" >> "$GITHUB_OUTPUT"
          echo "📌 构建时间(北京): ${DISPLAY_TIME}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          draft: false
          body: |
            ${{ steps.gen.outputs.changelog }}

            ---

            ## 🧪 测试版本 (Dev Build)

            | 项 | 值 |
            |---|---|
            | 版本 | `${{ steps.meta.outputs.dev_version }}` |
            | 分支 | `dev` |
            | 提交 | [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})) |
            | 构建时间 | ${{ steps.build_time.outputs.display }} |

            > ⚠️ 这是开发测试版本，仅供内部测试使用，不建议用于生产环境。
            > 每次 push 到 `dev` 分支会自动覆盖此 release。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 阶段二：各平台构建（Tauri 不传 tagName，仅构建不上传；产物重命名后 upload-artifact）
  build:
    needs: [dev-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
            os_name: windows
            arch_name: x64
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
            os_name: macos
            arch_name: x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            os_name: macos
            arch_name: arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage
            os_name: linux
            arch_name: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Tauri v2 的 webkit2gtk 链接 libsoup3（对应 webkit2gtk-4.1-dev），
          # 而非 v1 的 libsoup2.4（webkit2gtk-4.0-dev）。
          # libappindicator3-dev 已弃用，改用 libayatana-appindicator3-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev dpkg build-essential libssl-dev libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      # VITE 环境变量设置在 tauri-action 步骤上，确保 beforeBuildCommand 触发的
      # npm run build 能读取到（tauri.conf.json 中配置了 beforeBuildCommand）
      #   VITE_UPDATE_CHANNEL=dev → 前端 getBuildChannel() 返回 'dev'，更新通道默认选 dev
      #   VITE_APP_VERSION=dev-<SHA> → 前端 __APP_VERSION__ 显示为 dev-d0a6a97（msi 仍用 0.1.5 打包）
      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      # Tauri 构建：不传 tagName（避免 tauri-action 上传未重命名的产物）
      # msi 用 tauri.conf.json 中的版本号 0.1.5 打包，确保 WiX 版本号合法
      # beforeBuildCommand: "npm run build" 会自动构建前端（VITE env 在此步骤生效）
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          VITE_UPDATE_CHANNEL: dev
          VITE_APP_VERSION: ${{ needs.dev-release.outputs.dev_version }}
        with:
          projectPath: src-tauri
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # 产物重命名：统一为 FkeMark-{dev_version}-{os}-{arch}.{ext} 格式
      # 便于用户识别版本，与 GoNavi 产物命名风格对齐
      - name: Rename and collect artifacts
        shell: bash
        env:
          DEV_VERSION: ${{ needs.dev-release.outputs.dev_version }}
          OS_NAME: ${{ matrix.os_name }}
          ARCH_NAME: ${{ matrix.arch_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGING="release-staging"
          mkdir -p "$STAGING"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          echo "📦 收集并重命名产物 (dev_version=${DEV_VERSION}, os=${OS_NAME}, arch=${ARCH_NAME})"

          # Windows: msi + nsis + portable exe
          if [ "${OS_NAME}" = "windows" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/msi/*.msi; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.msi"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.msi)"
            done
            for f in "$BUNDLE_DIR"/nsis/*-setup.exe; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}-setup.exe"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}-setup.exe)"
            done
            # 便携版 exe（cargo 编译产物，不在 bundle 内）
            # Tauri 构建后会把 cargo 产物 fke-mark.exe 重命名为 FkeMark.exe，兼容两种命名
            PORTABLE="$(ls src-tauri/target/${TARGET}/release/FkeMark.exe src-tauri/target/${TARGET}/release/fke-mark.exe 2>/dev/null | head -1 || true)"
            if [ -n "$PORTABLE" ] && [ -f "$PORTABLE" ]; then
              cp "$PORTABLE" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}-portable.exe"
              echo "  ✅ $STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}-portable.exe"
            else
              echo "  ⚠️ 未找到便携版 exe，跳过"
            fi
          fi

          # macOS: dmg
          if [ "${OS_NAME}" = "macos" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/dmg/*.dmg; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.dmg"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.dmg)"
            done
          fi

          # Linux: deb + appimage
          if [ "${OS_NAME}" = "linux" ]; then
            shopt -s nullglob
            for f in "$BUNDLE_DIR"/deb/*.deb; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.deb"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.deb)"
            done
            for f in "$BUNDLE_DIR"/appimage/*.AppImage; do
              mv "$f" "$STAGING/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.AppImage"
              echo "  ✅ $(ls "$STAGING"/FkeMark-${DEV_VERSION}-${OS_NAME}-${ARCH_NAME}.AppImage)"
            done
          fi

          echo "📋 产物清单:"
          ls -lh "$STAGING"/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: release-staging/*
          if-no-files-found: error
          retention-days: 7

  # 阶段三：收集所有产物，生成 SHA256SUMS，上传到 Release
  publish:
    name: Publish Dev Pre-release
    needs: [dev-release, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: dev-build-*
          merge-multiple: true

      - name: List assets
        run: |
          echo "📋 下载的产物清单:"
          ls -lh release-assets/

      # 生成 SHA256SUMS 校验文件（借鉴 GoNavi，增强产物可信度）
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release-assets
          FILES=()
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              FILES+=("$file")
            fi
          done < <(find . -maxdepth 1 -type f ! -name SHA256SUMS -exec basename {} \; | sort)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ 未找到产物文件，生成空 SHA256SUMS"
            : > SHA256SUMS
          else
            sha256sum "${FILES[@]}" > SHA256SUMS
            echo "✅ SHA256SUMS 已生成:"
            cat SHA256SUMS
          fi

      # 生成 dev.json 静态更新清单（供客户端检查更新，避免 GitHub API 速率限制）
      # 客户端 updater.ts 会从 releases/download/dev-latest/dev.json 下载此文件
      - name: Generate dev.json manifest
        shell: bash
        env:
          DEV_VERSION: ${{ needs.dev-release.outputs.dev_version }}
          TAG_NAME: ${{ needs.dev-release.outputs.tag_name }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          python3 - <<'PY'
          import json, os, glob, hashlib
          version = os.environ['DEV_VERSION']
          tag = os.environ['TAG_NAME']
          repo = os.environ['GITHUB_REPO']
          server = os.environ.get('GITHUB_SERVER_URL', 'https://github.com')
          base_url = f"{server}/{repo}/releases/download/{tag}"
          html_url = f"{server}/{repo}/releases/tag/{tag}"
          def sha256_of(path):
              h = hashlib.sha256()
              with open(path, 'rb') as fp:
                  for chunk in iter(lambda: fp.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()
          files = sorted(glob.glob('release-assets/*'))
          files = [f for f in files if os.path.isfile(f) and not os.path.basename(f).endswith('.json') and os.path.basename(f) != 'SHA256SUMS']
          downloads = {}
          for f in files:
              name = os.path.basename(f)
              url = f"{base_url}/{name}"
              size = os.path.getsize(f)
              low = name.lower()
              # sha256 用于客户端应用内下载的完整性校验
              entry = {'name': name, 'url': url, 'size': size, 'sha256': sha256_of(f)}
              # Windows: 优先 -setup.exe，其次 .msi
              if 'windows' in low and ('-setup.exe' in low or low.endswith('.msi')):
                  if 'windows' not in downloads or '-setup.exe' in name:
                      downloads['windows'] = entry
              # macOS: .dmg
              elif 'macos' in low and low.endswith('.dmg'):
                  downloads.setdefault('macos', entry)
              # Linux: 优先 .deb，其次 .AppImage
              elif 'linux' in low and (low.endswith('.deb') or low.endswith('.appimage')):
                  if 'linux' not in downloads or low.endswith('.deb'):
                      downloads['linux'] = entry
          manifest = {
              'version': version,
              'tagName': tag,
              'pubDate': __import__('datetime').datetime.utcnow().isoformat() + 'Z',
              'releaseNotes': '开发测试构建 (Dev Build)',
              'htmlUrl': html_url,
              'downloads': downloads,
          }
          with open('release-assets/dev.json', 'w', encoding='utf-8') as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          print('✅ dev.json 已生成:')
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY

      # 上传重命名后的产物到 dev-latest release
      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.dev-release.outputs.tag_name }}
          name: ${{ needs.dev-release.outputs.release_name }}
          prerelease: true
          draft: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "🎉 Dev Build 发布完成"
          echo "  版本号: ${{ needs.dev-release.outputs.dev_version }}"
          echo "  Tag: ${{ needs.dev-release.outputs.tag_name }}"
          echo "  产物数: $(find release-assets -type f ! -name SHA256SUMS | wc -l)"
