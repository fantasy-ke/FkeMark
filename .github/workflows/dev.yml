name: Dev Build

# 推送到 dev 分支即触发，产出开发预发布版（tag: dev-latest，Pre-release，自动发布，仅供测试）
on:
  push:
    branches:
      - dev

env:
  APP_NAME: FkeMark

jobs:
  # 统一创建 dev-latest 预发布 Release；每次推送先清理旧的再重建，避免冲突
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute release metadata
        id: meta
        run: |
          # 开发测试版：版本号为 Dev Build (dev-<短SHA>)，Pre-release
          echo "tag_name=dev-latest" >> "$GITHUB_OUTPUT"
          echo "release_name=Dev Build (dev-${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
          echo "draft=false" >> "$GITHUB_OUTPUT"
      # dev 分支每次推送都会重建 dev-latest，先清理已存在的 release 与 tag
      - name: Reset dev-latest (delete existing release + tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev-latest --yes || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/dev-latest" || true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          body: '自动化开发构建（Dev Build），仅供测试，请勿用于生产环境。'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg app
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev dpkg build-essential libssl-dev libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      # 从独立文件加载 changelog 分类配置（.github/changelog.yml），与正式 Release 共用同一份
      - name: Load changelog config
        run: |
          echo "CHANGELOG<<EOF" >> "$GITHUB_ENV"
          cat .github/changelog.yml >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ needs.create-release.outputs.tag_name }}
          releaseName: ${{ needs.create-release.outputs.release_name }}
          releaseBody: '自动化开发构建（Dev Build），仅供测试，请勿用于生产环境。'
          releaseDraft: ${{ needs.create-release.outputs.draft }}
          prerelease: ${{ needs.create-release.outputs.prerelease }}
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          # 引用外部 changelog 配置文件（五类：新功能/问题修复/文档与流程/重构与优化/其他更新）
          changelog: ${{ env.CHANGELOG }}

      - name: Upload portable build (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-portable-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/FkeMark.exe
            src-tauri/icons/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
