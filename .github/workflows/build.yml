name: Build FkeMark

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: FkeMark

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg app
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator1-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FkeMark ${{ github.ref_name }}'
          releaseBody: 'FkeMark - Markdown Editor'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload portable build (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-portable-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/fke-mark.exe
            src-tauri/icons/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
