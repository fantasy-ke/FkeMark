name: Build FkeMark

# 仅当推送 tag（格式 v*）时自动触发打包；移除 workflow_dispatch 以保证只有 tag 才会自动构建
on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: FkeMark

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg app
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb appimage

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Tauri v1 的 webkit2gtk 链接 libsoup-2.4（对应 webkit2gtk-4.0-dev），
          # 而非 4.1（libsoup3）。libappindicator1-dev 已移除，改用 libappindicator3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev dpkg build-essential libssl-dev libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      # 关键修复：原配置 beforeBuildCommand 为空且未显式构建前端，
      # 导致 dist 目录缺失、tauri build 直接失败。这里先构建前端。
      - name: Build frontend
        run: npm run build

      - name: Generate icons
        run: |
          node scripts/gen-icons.cjs
          npx tauri icon src-tauri/icons/icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Tauri 工程位于 src-tauri 子目录，必须显式指定，否则在仓库根找 Cargo.toml 导致 ENOENT
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'FkeMark ${{ github.ref_name }}'
          releaseBody: 'FkeMark - 一款文件系统优先的极简 Markdown 混合即时渲染编辑器。'
          releaseDraft: true
          prerelease: false
          # 未启用 updater，关闭以免要求签名密钥
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # 便携版产物名需与 Cargo [[bin]] name = "FkeMark" 一致
      - name: Upload portable build (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-portable-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/FkeMark.exe
            src-tauri/icons/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FkeMark-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
